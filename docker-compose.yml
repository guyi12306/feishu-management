services:
  backend:
    build:
      context: ./backend
    env_file:
      - ./deploy/production.env
    environment:
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
      APP_RELOAD: "false"
      DATABASE_PATH: /app/backend/data/app.db
    volumes:
      - backend_data:/app/backend/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  web:
    build:
      context: ./web
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "127.0.0.1:8088:80"
    restart: unless-stopped

volumes:
  backend_data:
